<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">One boundary, two protocols: nanobind and DLPack in LichtFeld Studio</title>
  <desc id="desc">LichtFeld Studio's native C++ core owns the application state and a CUDA buffer. A Python plugin reaches application objects across the boundary through nanobind. lf.Tensor hands buffers to PyTorch or CuPy through DLPack, and both tensors point at the same GPU memory with no copy.</desc>
  <defs>
    <marker id="head-blue" markerWidth="10" markerHeight="10" refX="7.5" refY="4.5" orient="auto">
      <path d="M0.5,0.5 L8.5,4.5 L0.5,8.5 Z" fill="#1457ff"/>
    </marker>
    <marker id="head-green" markerWidth="10" markerHeight="10" refX="7.5" refY="4.5" orient="auto">
      <path d="M0.5,0.5 L8.5,4.5 L0.5,8.5 Z" fill="#059669"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfefe"/>
      <stop offset="1" stop-color="#f5f8fd"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Heading -->
  <text x="64" y="56" fill="#101828" font-family="'Space Grotesk', 'Manrope', 'Segoe UI', sans-serif" font-size="30" font-weight="700">One boundary, two protocols</text>
  <text x="64" y="88" fill="#667085" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="16">nanobind moves objects across the Python boundary. DLPack shares tensor buffers without copying them.</text>

  <!-- Python / native boundary -->
  <line x1="460" y1="134" x2="460" y2="528" stroke="#a8b6c9" stroke-width="1.6" stroke-dasharray="3 7" stroke-linecap="round"/>
  <text x="446" y="150" text-anchor="end" fill="#8494a8" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" letter-spacing="1.6">NATIVE C++</text>
  <text x="474" y="150" fill="#8494a8" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" letter-spacing="1.6">PYTHON</text>

  <!-- Native zone -->
  <rect x="64" y="160" width="336" height="368" rx="16" fill="#f4f7ff" stroke="#d9e2fa" stroke-width="1.5"/>
  <text x="88" y="198" fill="#101828" font-family="'Space Grotesk', 'Manrope', 'Segoe UI', sans-serif" font-size="20" font-weight="700">LichtFeld Studio</text>
  <text x="88" y="222" fill="#667085" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13">owns the scene and the memory</text>

  <!-- Application state block -->
  <rect x="88" y="244" width="288" height="104" rx="10" fill="#ffffff" stroke="#d9e2fa" stroke-width="1.5"/>
  <text x="106" y="274" fill="#1457ff" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="15" font-weight="800">Application state</text>
  <text x="106" y="300" fill="#475467" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13">scene graph · rendering · training</text>
  <text x="106" y="322" fill="#475467" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13">selection · UI · undo</text>

  <!-- CUDA buffer block -->
  <rect x="88" y="368" width="288" height="140" rx="10" fill="#101828"/>
  <text x="106" y="400" fill="#ffffff" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="15" font-weight="800">CUDA buffer</text>
  <text x="106" y="428" fill="#9db1d4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">means [N,3] · sh0 [N,1,3]</text>
  <text x="106" y="450" fill="#9db1d4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">scaling [N,3] · rotation [N,4]</text>
  <text x="106" y="472" fill="#9db1d4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">opacity [N,1] · shN (swizzled)</text>
  <text x="106" y="496" fill="#64748b" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5">one allocation, owned by the app</text>

  <!-- Object lane: plugin <-> application state via nanobind -->
  <rect x="560" y="244" width="240" height="104" rx="12" fill="#ffffff" stroke="#cfd8e3" stroke-width="1.5"/>
  <text x="580" y="276" fill="#101828" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="16" font-weight="800">Python plugin</text>
  <text x="580" y="304" fill="#1457ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13">lf.get_scene()</text>
  <text x="580" y="326" fill="#667085" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="12">panels · operators · training hooks</text>

  <line x1="430" y1="296" x2="546" y2="296" stroke="#1457ff" stroke-width="2.4" marker-end="url(#head-blue)"/>
  <line x1="490" y1="296" x2="390" y2="296" stroke="#1457ff" stroke-width="2.4" marker-end="url(#head-blue)"/>

  <rect x="418" y="280" width="84" height="32" rx="16" fill="#1457ff"/>
  <text x="460" y="301" text-anchor="middle" fill="#ffffff" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13" font-weight="800">nanobind</text>
  <text x="460" y="267" text-anchor="middle" fill="#5c6b91" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5" font-weight="700">objects</text>

  <!-- Buffer lane: lf.Tensor <-> tensor libraries via DLPack -->
  <rect x="560" y="368" width="200" height="140" rx="12" fill="#f0fdf6" stroke="#bce5cd" stroke-width="1.5"/>
  <text x="580" y="400" fill="#047857" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16" font-weight="700">lf.Tensor</text>
  <text x="580" y="428" fill="#334155" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">__dlpack__</text>
  <text x="580" y="450" fill="#334155" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">__dlpack_device__</text>
  <text x="580" y="472" fill="#334155" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">from_dlpack()</text>
  <text x="580" y="496" fill="#667085" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5">wraps the native buffer</text>

  <rect x="908" y="368" width="228" height="140" rx="12" fill="#fff7ef" stroke="#f5d3b3" stroke-width="1.5"/>
  <text x="928" y="400" fill="#c2410c" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="16" font-weight="800">Tensor libraries</text>
  <text x="928" y="428" fill="#475467" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13.5">PyTorch · CuPy · JAX</text>
  <text x="928" y="472" fill="#334155" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">torch.from_dlpack(t)</text>
  <text x="928" y="496" fill="#667085" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5">views the same buffer</text>

  <line x1="770" y1="414" x2="896" y2="414" stroke="#059669" stroke-width="2.4" marker-end="url(#head-green)"/>
  <line x1="898" y1="462" x2="772" y2="462" stroke="#059669" stroke-width="2.4" marker-end="url(#head-green)"/>
  <rect x="800" y="422" width="68" height="30" rx="15" fill="#047857"/>
  <text x="834" y="442" text-anchor="middle" fill="#ffffff" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13" font-weight="800">DLPack</text>
  <text x="834" y="403" text-anchor="middle" fill="#3f6f5a" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="11.5" font-weight="700">buffers</text>

  <!-- Zero-copy dotted pointers back to the CUDA buffer -->
  <path d="M660,508 C660,552 460,558 388,470" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="1 6" stroke-linecap="round"/>
  <path d="M1022,508 C1022,568 520,574 384,492" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="1 6" stroke-linecap="round"/>
  <text x="720" y="556" text-anchor="middle" fill="#047857" stroke="#f6f9fd" stroke-width="7" paint-order="stroke" stroke-linejoin="round" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="13" font-weight="700">same GPU memory — zero copy</text>

  <!-- Stream note -->
  <text x="64" y="584" fill="#8494a8" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="12.5">Stream-aware: consumers ask for the buffer on their own CUDA stream, and LichtFeld bridges streams with events instead of a global sync.</text>
</svg>